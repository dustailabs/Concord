name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Build core engine
        run: npm run build --workspace=@concord/core

      - name: Lint
        run: npm run lint

      - name: Test core engine
        run: npm run test --workspace=@concord/core

      - name: Build web demo
        run: npm run build --workspace=@concord/web
